<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Lumos Labs</title>
  <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="shortcut icon" href="/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-title" content="Lumos Labs" />
  <link rel="manifest" href="/site.webmanifest" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0 }

    :root {
      --black: #0B0B0C;
      --orange: #FF5A1F;
      --white: #F5F5F5;
      --white-dim: rgba(245, 245, 245, 0.55);
    }

    body {
      background: var(--black);
      color: var(--white);
      font-family: 'IBM Plex Sans', sans-serif;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 9999;
      opacity: .35;
    }

    .logo {
      position: fixed;
      top: 1.5rem;
      left: 3rem;
      font-size: 1.3rem;
      font-weight: 700;
      letter-spacing: .12em;
      font-family: 'Georgia', serif;
      text-decoration: none;
      color: var(--white);
    }

    .logo span { color: var(--orange) }

    .number {
      font-family: 'Georgia', serif;
      font-size: clamp(7rem, 20vw, 16rem);
      font-weight: 700;
      line-height: 1;
      letter-spacing: -.03em;
      color: var(--white);
      opacity: .06;
      position: absolute;
      pointer-events: none;
      user-select: none;
    }

    .content {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
    }

    .eyebrow {
      font-size: .7rem;
      letter-spacing: .22em;
      text-transform: uppercase;
      color: var(--orange);
      font-weight: 500;
    }

    h1 {
      font-family: 'Georgia', serif;
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 700;
      letter-spacing: -.02em;
      line-height: 1.1;
    }

    p {
      font-size: 1rem;
      font-weight: 300;
      color: var(--white-dim);
      max-width: 380px;
      line-height: 1.6;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: .5rem;
      margin-top: .5rem;
      padding: .85rem 2rem;
      background: var(--orange);
      color: #000;
      font-size: .75rem;
      font-weight: 600;
      letter-spacing: .14em;
      text-transform: uppercase;
      text-decoration: none;
      border-radius: 2px;
      transition: opacity .2s ease;
    }

    .btn:hover { opacity: .85 }
  </style>
</head>

<body>
  <a href="/" class="logo">LUMOS<span>.</span></a>

  <div class="number">404</div>

  <div class="content">
    <div class="eyebrow">Error 404</div>
    <h1>Page not found</h1>
    <p>The page you're looking for doesn't exist or has been moved.</p>
    <a href="index.html" class="btn">Back to Home <span>→</span></a>
  </div>
</body>

</html>
